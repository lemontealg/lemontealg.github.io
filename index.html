<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>柠檬茶 · 生态排序启动器</title>
    <link rel="icon" type="image/png" href="https://eastel.com.my/wp-content/uploads/2025/10/Eastel-App.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0c15;
            overflow-x: hidden;
            color: #fff;
        }

        /* 动态生态光晕背景 */
        .bg-ecosystem {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, rgba(255, 212, 71, 0.1), rgba(10, 12, 21, 0.96));
        }
        .bg-gradient-orb {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(255, 212, 71, 0.2) 0%, rgba(255, 140, 50, 0) 70%);
            border-radius: 50%;
            top: -20%;
            right: -20%;
            z-index: -1;
            filter: blur(80px);
            animation: floatOrb 18s infinite alternate ease-in-out;
        }
        .bg-gradient-orb2 {
            left: -20%;
            bottom: -20%;
            top: auto;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            animation: floatOrb2 22s infinite alternate;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(5%, 5%) scale(1.2); opacity: 0.9; }
        }
        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-3%, -3%) scale(1.3); opacity: 0.8; }
        }

        /* 背景图片层 (半透明叠加) */
        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .bg-img.active { opacity: 0.5; }
        .bg-mobile, .bg-desktop { position: relative; width: 100%; height: 100%; }
        @media (max-width: 768px) { .bg-desktop { display: none; } .bg-mobile { display: block; } }
        @media (min-width: 769px) { .bg-mobile { display: none; } .bg-desktop { display: block; } }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            position: relative;
            z-index: 5;
            min-height: 100vh;
        }

        .eco-header {
            text-align: center;
            margin-bottom: 32px;
            padding: 12px 0;
        }
        .eco-title {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .eco-sub {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 8px;
        }

        /* 网格布局 */
        .app-grid {
            display: grid;
            justify-items: center;
            align-items: start;
            gap: 28px 20px;
            margin-bottom: 48px;
        }
        @media (max-width: 768px) {
            .app-grid {
                grid-template-columns: repeat(var(--mobile-cols, 3), minmax(74px, 92px));
                gap: 24px 12px;
                justify-content: center;
            }
            .app-icon { width: var(--icon-size-m, 74px); }
            .icon-bg { width: var(--icon-size-m, 74px); height: var(--icon-size-m, 74px); border-radius: var(--icon-radius, 24px); }
            .app-label { font-size: 11px; margin-top: 10px; padding: 5px 10px; max-width: 90px; }
        }
        @media (min-width: 769px) {
            .app-grid {
                grid-template-columns: repeat(var(--desktop-cols, 8), minmax(80px, 96px));
                gap: 32px 24px;
                justify-content: center;
            }
            .app-icon { width: var(--icon-size-d, 82px); transition: transform 0.25s ease; }
            .app-icon:hover { transform: translateY(-6px); }
            .icon-bg { width: var(--icon-size-d, 82px); height: var(--icon-size-d, 82px); border-radius: var(--icon-radius, 26px); }
            .app-label { font-size: 12.5px; margin-top: 12px; padding: 6px 12px; max-width: 110px; }
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            background: transparent;
            border: none;
        }
        .app-icon:active { transform: scale(0.96); }
        .icon-bg {
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 212, 71, 0.2);
            transition: all 0.2s;
        }
        .icon-bg.solid-bg {
            background: linear-gradient(145deg, rgba(255, 245, 200, 0.2), rgba(255, 180, 60, 0.2));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 212, 71, 0.5);
        }
        .app-label {
            font-weight: 540;
            color: rgba(255, 255, 245, 0.95);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            text-align: center;
            background: rgba(20, 20, 30, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 0.5px solid rgba(255, 212, 71, 0.3);
        }

        /* 视频播放器 */
        .video-container {
            margin-top: 28px;
            display: none;
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 20px;
            border: 1px solid rgba(255, 212, 71, 0.4);
        }
        .video-container.show { display: block; animation: fadeSlideUp 0.5s ease; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .drive-player, .youtube-player { width: 100%; height: 300px; border-radius: 36px; border: none; }
        .video-title { color: #FFD966; font-weight: 600; margin: 12px 0 10px; text-align: center; }
        .close-video { background: rgba(255,212,71,0.2); border: 1px solid rgba(255,212,71,0.6); padding: 10px 28px; border-radius: 40px; margin-top: 16px; cursor: pointer; color: #FFD966; }

        .login-entrance {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 60px; color: #FFD966;
            cursor: pointer; z-index: 100; border: 1px solid rgba(255, 212, 71, 0.4);
        }
        .device-indicator {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
            padding: 6px 18px; border-radius: 40px; font-size: 11px; color: #FFD966; z-index: 99;
        }

        /* 模态框 */
        .overlay-base {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(8, 12, 24, 0.85); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; visibility: hidden; transition: 0.25s;
        }
        .overlay-base.active { opacity: 1; visibility: visible; }
        .modal-card {
            background: rgba(28, 32, 48, 0.95); backdrop-filter: blur(24px);
            border-radius: 56px; padding: 32px 28px; width: 340px;
            text-align: center; border: 1px solid rgba(255, 212, 71, 0.5);
        }
        .modal-card h3 { color: #FFD966; margin-bottom: 12px; }
        .modal-card input {
            width: 100%; padding: 14px; border-radius: 60px;
            background: #1e243b; border: 1px solid #FFD44799;
            color: white; text-align: center; margin-bottom: 22px;
        }
        .btn-group { display: flex; gap: 12px; }
        .btn-confirm { background: #FFD447; color: #1a1e2b; border: none; padding: 12px 0; border-radius: 60px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-cancel { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); color: #eee; border-radius: 60px; padding: 12px 0; width: 100%; cursor: pointer; }
        .error-msg { color: #ff9f8a; font-size: 12px; margin-top: -12px; margin-bottom: 12px; }

        .fullscreen-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #05070f; z-index: 3000;
            display: flex; flex-direction: column; opacity:0; visibility: hidden; transition: 0.2s;
        }
        .fullscreen-overlay.active { opacity:1; visibility: visible; }
        .fullscreen-header { background: #FFD447; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
        .fullscreen-title { font-weight: 700; color: #1e1e2f; }
        .fullscreen-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #1e1e2f; width: 44px; }
        .fullscreen-frame { width: 100%; flex:1; border: none; background: white; }
        .fullscreen-loading { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); padding:10px 24px; border-radius:60px; display:none; }

        .hidden { display: none; }
        .loading-tip { text-align: center; padding: 50px; color: #FFD966; }

        /* 后台管理 - 排序增强 */
        .admin-container {
            max-width: 1400px;
            margin: 30px auto;
            background: rgba(30, 34, 48, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 32px 36px;
            border: 1px solid rgba(255,212,71,0.3);
            color: #eee;
        }
        .admin-container h1, .admin-container h2 { color: #FFD966; }
        .admin-container input, .admin-container select { background: #232a3f; border: 1px solid #FFD96688; color: white; border-radius: 60px; padding: 12px 16px; width: 100%; margin: 6px 0; }
        .card, .video-card { background: #1e2538cc; backdrop-filter: blur(8px); border-radius: 32px; padding: 20px; border: 1px solid rgba(255,212,71,0.3); margin-bottom: 20px; }
        .badge { background: #FFD447; color: #1e1e2f; display: inline-block; padding: 4px 16px; border-radius: 40px; font-size: 12px; font-weight: bold; margin-bottom: 14px; }
        .btn-primary { background: #FFD447; color: #1e1e2f; border: none; padding: 8px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ff5e57cc; color: white; border: none; padding: 8px 16px; border-radius: 60px; cursor: pointer; }
        .sort-row { display: flex; gap: 12px; align-items: center; margin: 12px 0; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 60px; }
        .sort-row label { font-size: 13px; font-weight: 500; min-width: 80px; }
        .sort-row input { width: 80px; margin: 0; text-align: center; padding: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .publish-bar { background: #11161fcc; border-radius: 60px; padding: 20px; margin-top: 40px; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
    </style>
</head>
<body>
<div class="bg-ecosystem"></div>
<div class="bg-gradient-orb"></div>
<div class="bg-gradient-orb bg-gradient-orb2"></div>
<div class="bg-image-layer">
    <div class="bg-mobile"><div class="bg-img" id="mobileBg1"></div><div class="bg-img" id="mobileBg2"></div></div>
    <div class="bg-desktop"><div class="bg-img" id="desktopBg1"></div><div class="bg-img" id="desktopBg2"></div></div>
</div>
<div class="login-entrance" onclick="showLoginModal()"><i class="fas fa-leaf"></i> 管理</div>
<div class="device-indicator" id="deviceIndicator"><i class="fas fa-mobile-alt"></i> 加载中</div>

<div id="frontendContainer" class="container">
    <div class="eco-header"><div class="eco-title"><i class="fas fa-seedling"></i>  <i class="fas fa-arrows-alt"></i></div><div class="eco-sub">自由拖拽排序 · 一键定义你的专属空间</div></div>
    <div id="loadingMsg" class="loading-tip"><i class="fas fa-spinner fa-pulse"></i> 唤醒...</div>
    <div id="mainContent" style="display: none;">
        <div class="app-grid" id="appGrid"></div>
        <div class="app-grid" id="videoGrid"></div>
        <div id="videoPlayerBox" class="video-container"><div class="video-title" id="videoPlayerTitle"></div><div id="playerContainer"></div><div style="text-align: center;"><button class="close-video" onclick="closeVideoPlayer()"><i class="fas fa-times-circle"></i> 关闭</button></div></div>
    </div>
</div>

<div id="adminContainer" class="admin-container hidden">
    <div class="flex-between"><h1><i class="fas fa-sort-amount-down-alt"></i> 排序中枢</h1><button class="btn-primary" onclick="logout()">退出管理</button></div>
    <div id="adminLoadingMsg">加载数据...</div>
    <div id="adminPanel" style="display:none;">
        <h2><i class="fas fa-images"></i> 背景光域</h2>
        <div style="background:#1a1f2ecc; border-radius: 40px; padding: 24px; margin-bottom: 32px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div><label>📱 手机背景1</label><input id="mbg1" placeholder="图片URL"></div><div><label>📱 手机背景2</label><input id="mbg2"></div>
                <div><label>💻 电脑背景1</label><input id="dbg1"></div><div><label>💻 电脑背景2</label><input id="dbg2"></div>
            </div>
            <div style="margin-top:20px; display:flex; gap:20px; align-items:center;"><label>⏱️ 切换间隔(秒)</label><input type="number" id="bgIntervalSec" value="5" style="width:100px;"><button class="btn-primary" onclick="applyBgSettings()">应用光晕</button></div>
        </div>
        <h2><i class="fas fa-sliders-h"></i> 生态布局 (图标+文字)</h2>
        <div style="background:#1a1f2ecc; border-radius: 40px; padding: 24px; margin-bottom: 32px;">
            <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                <div><label>📱 图标大小</label><input type="range" id="mobileSizeRange" min="60" max="100"><span id="mobileSizeShow"></span></div>
                <div><label>📱 每行数量</label><input type="range" id="mobileColsRange" min="2" max="5"><span id="mobileColsShow"></span></div>
                <div><label>💻 图标大小</label><input type="range" id="desktopSizeRange" min="65" max="110"><span id="desktopSizeShow"></span></div>
                <div><label>💻 每行数量</label><input type="range" id="desktopColsRange" min="5" max="12"><span id="desktopColsShow"></span></div>
                <div><label>✨ 圆角</label><input type="range" id="radiusRange" min="16" max="40"><span id="radiusShow"></span></div>
            </div>
            <button class="btn-primary" onclick="saveLayoutSettings()" style="margin-top:20px;">保存布局</button>
        </div>

        <!-- ========= APP 排序管理 ========= -->
        <h2><i class="fas fa-th-large"></i> APP 应用 · 拖动序号自由排序</h2>
        <div id="adminAppList" class="card-grid"></div>
        <button class="btn-primary" onclick="addAppItem()" style="margin:20px 0;"><i class="fas fa-plus-circle"></i> 新增应用</button>

        <!-- ========= 视频排序管理 ========= -->
        <h2><i class="fas fa-video"></i> 视频生态 · 自由排序</h2>
        <div id="adminVideoList"></div>
        <button class="btn-primary" onclick="addVideoItem()"><i class="fas fa-plus-circle"></i> 新增视频</button>

        <div class="publish-bar"><span><i class="fas fa-cloud-upload-alt"></i> 导出生态配置 (包含排序)</span><button class="btn-primary" onclick="copyConfigToClipboard()">复制JSON配置</button><a href="https://gist.github.com/lemontea128/d5292631b622662789a4c72a6856d71c/edit" target="_blank" style="color:#FFD966;">更新Gist</a></div>
    </div>
</div>

<!-- 密码弹窗等 -->
<div id="appPwdOverlay" class="overlay-base"><div class="modal-card"><h3><i class="fas fa-lock"></i> 应用密钥</h3><div id="appPwdHint" class="modal-sub"></div><input type="password" id="appPwdInput" placeholder="通行码"><div id="appPwdError" class="error-msg"></div><div class="btn-group"><button class="btn-cancel" onclick="closeAppPwdModal()">取消</button><button class="btn-confirm" id="appPwdConfirmBtn">验证</button></div></div></div>
<div id="videoPwdOverlay" class="overlay-base"><div class="modal-card"><h3><i class="fas fa-film"></i> 视频密境</h3><div id="videoPwdHint" class="modal-sub"></div><input type="password" id="videoPwdInput" placeholder="密码"><div id="videoPwdError" class="error-msg"></div><div class="btn-group"><button class="btn-cancel" onclick="closeVideoPwdModal()">取消</button><button class="btn-confirm" id="videoPwdConfirmBtn">进入</button></div></div></div>
<div id="loginOverlay" class="overlay-base"><div class="modal-card"><h3><i class="fas fa-user-astronaut"></i> 管理员</h3><input type="text" id="loginUsername" placeholder="账号"><input type="password" id="loginPassword" placeholder="密码"><div id="loginError" class="error-msg"></div><div class="btn-group"><button class="btn-cancel" onclick="closeLoginModal()">取消</button><button class="btn-confirm" id="loginConfirmBtn">登录中枢</button></div></div></div>
<div id="fullscreenContainer" class="fullscreen-overlay"><div class="fullscreen-header"><span id="fullscreenTitle"><i class="fas fa-globe"></i> 生态视界</span><button class="fullscreen-close" onclick="closeFullscreen()">✕</button></div><div class="fullscreen-loading" id="fsLoading">加载中...</div><iframe id="fullscreenIframe" class="fullscreen-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads allow-top-navigation"></iframe></div>

<script>
    const GIST_URL = 'https://gist.githubusercontent.com/lemontealg/0f92da20b392ee53b27754ba06306566/raw/config.json';
    const ADMIN_CRED = { username: 'lg', password: '128128' };
    let cfg = null;
    let isAdmin = sessionStorage.getItem('lemontea_admin') === 'true';
    let bgTimer = null;
    let pendingApp = null, pendingVideo = null;

    function getRandColor() { return ['#FFB347','#FFD966','#6CD4C5','#A98BEF','#FF8C69','#7FCDCD','#F4A261'][Math.floor(Math.random()*7)]; }
    async function loadConfig() {
        try {
            let res = await fetch(CONFIG_URL + '?t=' + Date.now());
            cfg = await res.json();
        } catch(e) {
            cfg = { bgInterval:5, mobileBackgrounds:['',''], desktopBackgrounds:['',''], appButtons:[], videoButtons:[], layout:{ mobileSize:74, mobileCols:3, desktopSize:82, desktopCols:8, radius:24 } };
        }
        if(!cfg.appButtons) cfg.appButtons = [];
        if(!cfg.videoButtons) cfg.videoButtons = [];
        if(!cfg.layout) cfg.layout = { mobileSize:74, mobileCols:3, desktopSize:82, desktopCols:8, radius:24 };
        // 确保每个按钮都有 order 字段用于排序 (兼容旧数据)
        cfg.appButtons.forEach((btn, idx) => { if(btn.order === undefined) btn.order = idx; });
        cfg.videoButtons.forEach((vid, idx) => { if(vid.order === undefined) vid.order = idx; });
        // 按照 order 升序排序
        cfg.appButtons.sort((a,b) => (a.order||0) - (b.order||0));
        cfg.videoButtons.sort((a,b) => (a.order||0) - (b.order||0));
        applyLayout();
        startBgTimer();
        refreshBgImages();
    }
    function applyLayout() { let l=cfg.layout; document.documentElement.style.setProperty('--icon-size-m', l.mobileSize+'px'); document.documentElement.style.setProperty('--mobile-cols', l.mobileCols); document.documentElement.style.setProperty('--icon-size-d', l.desktopSize+'px'); document.documentElement.style.setProperty('--desktop-cols', l.desktopCols); document.documentElement.style.setProperty('--icon-radius', l.radius+'px'); }
    function refreshBgImages() { let isMobile=window.innerWidth<=768; let arr=isMobile?cfg.mobileBackgrounds:cfg.desktopBackgrounds; let bg1=isMobile?document.getElementById('mobileBg1'):document.getElementById('desktopBg1'); let bg2=isMobile?document.getElementById('mobileBg2'):document.getElementById('desktopBg2'); if(bg1&&arr[0]) bg1.style.backgroundImage=`url('${arr[0]}')`; if(bg2&&arr[1]) bg2.style.backgroundImage=`url('${arr[1]}')`; if(bg1) bg1.classList.add('active'); if(bg2) bg2.classList.remove('active'); }
    function startBgTimer() { if(bgTimer) clearInterval(bgTimer); let sec=cfg.bgInterval||5; if(sec<2) return; let active=1; bgTimer=setInterval(()=>{ let isMobile=window.innerWidth<=768; let bg1=isMobile?document.getElementById('mobileBg1'):document.getElementById('desktopBg1'); let bg2=isMobile?document.getElementById('mobileBg2'):document.getElementById('desktopBg2'); if(!bg1||!bg2) return; if(active===1){ bg1.classList.remove('active'); bg2.classList.add('active'); active=2; }else{ bg2.classList.remove('active'); bg1.classList.add('active'); active=1; } }, sec*1000); }
    function detectDevice() { let w=window.innerWidth; document.getElementById('deviceIndicator').innerHTML = w<=768 ? '<i class="fas fa-mobile-alt"></i> 移动生态 · 可排序' : '<i class="fas fa-desktop"></i> 桌面生态 · 自由排序'; }
    window.addEventListener('resize',()=>{ detectDevice(); refreshBgImages(); if(!isAdmin) renderFrontend(); });

    // 前台渲染 (按顺序)
    function renderFrontend() {
        let appGrid=document.getElementById('appGrid'), videoGrid=document.getElementById('videoGrid');
        appGrid.innerHTML=''; videoGrid.innerHTML='';
        window.videoMeta={};
        cfg.videoButtons.forEach((v,idx)=>{ 
            let vid=''; if(v.platform==='google-drive') vid=v.fileId; else{ let yt=v.youtubeUrl||''; if(yt.includes('youtu.be')) yt=yt.split('/').pop().split('?')[0]; else if(yt.includes('watch')){ let m=yt.match(/[?&]v=([^&]+)/); if(m) yt=m[1]; } vid=yt; } 
            window.videoMeta[`v${idx}`]={ platform:v.platform, id:vid, title:v.label||'视频', password:v.password||'', passwordHint:v.passwordHint||'', color:v.color||getRandColor(), buttonImage:v.buttonImage||'' }; 
        });
        cfg.appButtons.forEach(btn=>{ let el=createIcon(btn.label||'应用', btn.buttonImage, btn.color||getRandColor()); el.onclick=()=>handleApp(btn); appGrid.appendChild(el); });
        cfg.videoButtons.forEach((v,idx)=>{ let meta=window.videoMeta[`v${idx}`]; let el=createIcon(v.label||'视频', v.buttonImage, v.color||getRandColor()); el.onclick=()=>requestVideoPlay(meta); videoGrid.appendChild(el); });
    }
    function createIcon(label, imgUrl, bgColor){ let wrap=document.createElement('div'); wrap.className='app-icon'; let bg=document.createElement('div'); bg.className='icon-bg'; let r=cfg.layout?.radius||24; bg.style.borderRadius=r+'px'; if(imgUrl&&imgUrl.trim()){ bg.style.backgroundImage=`url('${imgUrl}')`; bg.style.backgroundSize='cover'; }else{ bg.style.backgroundColor=bgColor; bg.classList.add('solid-bg'); } let txt=document.createElement('span'); txt.className='app-label'; txt.innerText=(label&&label.trim())?label:'未命名'; wrap.appendChild(bg); wrap.appendChild(txt); return wrap; }
    function handleApp(btn){ if(btn.password&&btn.password.trim()){ pendingApp=btn; showAppPwd(btn.label||'应用',btn.passwordHint||'输入生态密码'); return; } executeApp(btn); }
    function executeApp(btn){ closeVideoPlayer(); if(btn.openType==='fullscreen'){ let ifr=document.getElementById('fullscreenIframe'); let ld=document.getElementById('fsLoading'); document.getElementById('fullscreenTitle').innerHTML=`<i class="fas fa-leaf"></i> ${btn.label||'应用'}`; document.getElementById('fullscreenContainer').classList.add('active'); document.body.style.overflow='hidden'; if(btn.autoRefresh){ ld.style.display='block'; let url=btn.url+(btn.url.includes('?')?'&_t=':'?_t=')+Date.now(); ifr.src=url; ifr.onload=()=>setTimeout(()=>ld.style.display='none',400); }else{ ifr.src=btn.url; } }else{ window.open(btn.url,'_blank'); } }
    function requestVideoPlay(meta){ if(meta.password&&meta.password.trim()){ pendingVideo=meta; showVideoPwd(meta.title,meta.passwordHint); return; } playVideo(meta); }
    function playVideo(meta){ closeFullscreen(); let cont=document.getElementById('playerContainer'); cont.innerHTML=''; document.getElementById('videoPlayerTitle').innerHTML=`🎬 ${meta.title}`; if(meta.platform==='google-drive'){ let ifr=document.createElement('iframe'); ifr.className='drive-player'; ifr.src=`https://drive.google.com/file/d/${meta.id}/preview`; ifr.allowFullscreen=true; cont.appendChild(ifr); }else{ let ifr=document.createElement('iframe'); ifr.className='youtube-player'; ifr.src=`https://www.youtube.com/embed/${meta.id}?autoplay=1`; ifr.allowFullscreen=true; cont.appendChild(ifr); } document.getElementById('videoPlayerBox').classList.add('show'); }
    window.closeVideoPlayer=()=>{ document.getElementById('playerContainer').innerHTML=''; document.getElementById('videoPlayerBox').classList.remove('show'); };
    function closeFullscreen(){ document.getElementById('fullscreenContainer').classList.remove('active'); document.getElementById('fullscreenIframe').src='about:blank'; document.body.style.overflow=''; }

    // 密码弹窗 enter 支持 (略 保持原有)
    function showAppPwd(title,hint){ document.getElementById('appPwdHint').innerText=hint; document.getElementById('appPwdInput').value=''; document.getElementById('appPwdError').innerText=''; document.getElementById('appPwdOverlay').classList.add('active'); let inp=document.getElementById('appPwdInput'); inp.focus(); let btn=document.getElementById('appPwdConfirmBtn'); let newBtn=btn.cloneNode(true); btn.parentNode.replaceChild(newBtn,btn); newBtn.onclick=()=>{ let val=document.getElementById('appPwdInput').value; if(val===pendingApp.password){ executeApp(pendingApp); closeAppPwdModal(); }else{ document.getElementById('appPwdError').innerText='密码错误'; inp.value=''; inp.focus(); } }; inp.onkeypress=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); newBtn.click(); } }; }
    function closeAppPwdModal(){ document.getElementById('appPwdOverlay').classList.remove('active'); pendingApp=null; }
    function showVideoPwd(title,hint){ document.getElementById('videoPwdHint').innerText=hint; document.getElementById('videoPwdInput').value=''; document.getElementById('videoPwdError').innerText=''; document.getElementById('videoPwdOverlay').classList.add('active'); let inp=document.getElementById('videoPwdInput'); inp.focus(); let btn=document.getElementById('videoPwdConfirmBtn'); let newBtn=btn.cloneNode(true); btn.parentNode.replaceChild(newBtn,btn); newBtn.onclick=()=>{ let val=document.getElementById('videoPwdInput').value; if(val===pendingVideo.password){ playVideo(pendingVideo); closeVideoPwdModal(); }else{ document.getElementById('videoPwdError').innerText='密码错误'; inp.value=''; inp.focus(); } }; inp.onkeypress=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); newBtn.click(); } }; }
    function closeVideoPwdModal(){ document.getElementById('videoPwdOverlay').classList.remove('active'); pendingVideo=null; }

    // 登录
    function showLoginModal(){ let ov=document.getElementById('loginOverlay'); ov.classList.add('active'); document.getElementById('loginUsername').value=''; document.getElementById('loginPassword').value=''; document.getElementById('loginError').innerText=''; let user=document.getElementById('loginUsername'); user.focus(); let btn=document.getElementById('loginConfirmBtn'); let newBtn=btn.cloneNode(true); btn.parentNode.replaceChild(newBtn,btn); let pwdInp=document.getElementById('loginPassword'); pwdInp.onkeypress=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); newBtn.click(); } }; newBtn.onclick=()=>{ let u=document.getElementById('loginUsername').value; let p=document.getElementById('loginPassword').value; if(u===ADMIN_CRED.username && p===ADMIN_CRED.password){ sessionStorage.setItem('lemontea_admin','true'); isAdmin=true; closeLoginModal(); document.getElementById('frontendContainer').classList.add('hidden'); document.getElementById('adminContainer').classList.remove('hidden'); renderAdmin(); }else{ document.getElementById('loginError').innerText='账号或密码错误'; pwdInp.value=''; pwdInp.focus(); } }; }
    function closeLoginModal(){ document.getElementById('loginOverlay').classList.remove('active'); }
    function logout(){ sessionStorage.removeItem('lemontea_admin'); isAdmin=false; document.getElementById('adminContainer').classList.add('hidden'); document.getElementById('frontendContainer').classList.remove('hidden'); renderFrontend(); refreshBgImages(); startBgTimer(); }

    // 后台渲染 (包含排序输入框)
    function renderAdmin(){
        document.getElementById('adminLoadingMsg').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        let l=cfg.layout;
        document.getElementById('mobileSizeRange').value=l.mobileSize; document.getElementById('mobileSizeShow').innerText=l.mobileSize+'px';
        document.getElementById('mobileColsRange').value=l.mobileCols; document.getElementById('mobileColsShow').innerText=l.mobileCols;
        document.getElementById('desktopSizeRange').value=l.desktopSize; document.getElementById('desktopSizeShow').innerText=l.desktopSize+'px';
        document.getElementById('desktopColsRange').value=l.desktopCols; document.getElementById('desktopColsShow').innerText=l.desktopCols;
        document.getElementById('radiusRange').value=l.radius; document.getElementById('radiusShow').innerText=l.radius+'px';
        document.getElementById('mbg1').value=cfg.mobileBackgrounds?.[0]||''; document.getElementById('mbg2').value=cfg.mobileBackgrounds?.[1]||'';
        document.getElementById('dbg1').value=cfg.desktopBackgrounds?.[0]||''; document.getElementById('dbg2').value=cfg.desktopBackgrounds?.[1]||'';
        document.getElementById('bgIntervalSec').value=cfg.bgInterval||5;

        // APP排序列表
        let appDiv=document.getElementById('adminAppList'); appDiv.innerHTML='';
        cfg.appButtons.forEach((btn,i)=>{
            appDiv.innerHTML+=`<div class='card' data-appidx='${i}'><div class='badge'>🍋 APP 序号 <input type='number' id='app_order_${i}' value='${btn.order??i}' style='width:70px; display:inline-block; margin-left:8px;' min='0' max='999' class='sort-order-input'></div>
                <label>名称</label><input id='an_${i}' value='${escapeHtml(btn.label||'')}'>
                <label>链接</label><input id='au_${i}' value='${escapeHtml(btn.url||'')}'>
                <label>颜色</label><div><input type='color' id='ac_${i}' value='${btn.color||'#FFB347'}'><input id='act_${i}' value='${btn.color||'#FFB347'}'></div>
                <label>图片URL</label><input id='aimg_${i}' value='${escapeHtml(btn.buttonImage||'')}'>
                <label>打开方式</label><select id='aopen_${i}'><option value='fullscreen' ${btn.openType==='fullscreen'?'selected':''}>全屏</option><option value='newtab' ${btn.openType==='newtab'?'selected':''}>新窗口</option></select>
                <label>密码</label><input id='apwd_${i}' type='password' value='${escapeHtml(btn.password||'')}'>
                <label>自动刷新</label><select id='aref_${i}'><option value='true' ${btn.autoRefresh!==false?'selected':''}>开启</option><option value='false' ${btn.autoRefresh===false?'selected':''}>关闭</option></select>
                <label>密码提示</label><input id='ahint_${i}' value='${escapeHtml(btn.passwordHint||'')}'>
                <button class='btn-danger' onclick='removeApp(${i})'>删除</button>
            </div>`;
        });
        // 视频排序列表
        let vidDiv=document.getElementById('adminVideoList'); vidDiv.innerHTML='';
        cfg.videoButtons.forEach((v,i)=>{
            vidDiv.innerHTML+=`<div class='video-card'><div class='badge'>🎬 视频序号 <input type='number' id='video_order_${i}' value='${v.order??i}' style='width:70px; display:inline-block; margin-left:8px;' min='0' max='999'></div>
                <label>名称</label><input id='vn_${i}' value='${escapeHtml(v.label||'')}'>
                <label>平台</label><select id='vplat_${i}'><option value='google-drive' ${v.platform==='google-drive'?'selected':''}>Google Drive</option><option value='youtube' ${v.platform==='youtube'?'selected':''}>YouTube</option></select>
                <label>ID/链接</label><input id='vin_${i}' value='${escapeHtml(v.platform==='google-drive'? (v.fileId||''): (v.youtubeUrl||''))}'>
                <label>颜色</label><div><input type='color' id='vcol_${i}' value='${v.color||'#6CD4C5'}'><input id='vcolt_${i}' value='${v.color||'#6CD4C5'}'></div>
                <label>按钮图片</label><input id='vimg_${i}' value='${escapeHtml(v.buttonImage||'')}'>
                <label>密码</label><input id='vpwd_${i}' type='password' value='${escapeHtml(v.password||'')}'>
                <label>密码提示</label><input id='vhint_${i}' value='${escapeHtml(v.passwordHint||'')}'>
                <button class='btn-danger' onclick='removeVideo(${i})'>删除</button>
            </div>`;
        });
        // 添加排序应用按钮
        if(!window._sortListenerAdded){
            document.getElementById('adminAppList')?.addEventListener('change', (e)=>{
                if(e.target.classList.contains('sort-order-input')){ applySortAndReorder(); }
            });
            document.getElementById('adminVideoList')?.addEventListener('change', (e)=>{
                if(e.target.id?.startsWith('video_order_')){ applySortAndReorder(); }
            });
            window._sortListenerAdded=true;
        }
    }
    // 重新根据order字段排序数组并重新渲染后台和前台
    function applySortAndReorder(){
        // 收集APP最新order
        for(let i=0;i<cfg.appButtons.length;i++){
            let orderVal = document.getElementById(`app_order_${i}`)?.value;
            if(orderVal !== undefined) cfg.appButtons[i].order = parseInt(orderVal) || i;
        }
        cfg.appButtons.sort((a,b)=> (a.order||0) - (b.order||0));
        for(let i=0;i<cfg.videoButtons.length;i++){
            let orderVal = document.getElementById(`video_order_${i}`)?.value;
            if(orderVal !== undefined) cfg.videoButtons[i].order = parseInt(orderVal) || i;
        }
        cfg.videoButtons.sort((a,b)=> (a.order||0) - (b.order||0));
        // 重新渲染后台保持序号输入框最新顺序
        renderAdmin();
        if(!isAdmin) renderFrontend(); else renderFrontend(); // 同时刷新前台
    }

    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    window.addAppItem=function(){ let newOrder = cfg.appButtons.length; cfg.appButtons.push({label:'新应用',url:'https://',color:getRandColor(),buttonImage:'',openType:'fullscreen',password:'',autoRefresh:true,passwordHint:'生态密码', order:newOrder}); renderAdmin(); applySortAndReorder(); };
    window.addVideoItem=function(){ let newOrder = cfg.videoButtons.length; cfg.videoButtons.push({label:'新视界',platform:'google-drive',fileId:'',youtubeUrl:'',color:getRandColor(),buttonImage:'',password:'',passwordHint:'观影密码', order:newOrder}); renderAdmin(); applySortAndReorder(); };
    window.removeApp=function(i){ cfg.appButtons.splice(i,1); renderAdmin(); applySortAndReorder(); };
    window.removeVideo=function(i){ cfg.videoButtons.splice(i,1); renderAdmin(); applySortAndReorder(); };
    window.saveLayoutSettings=function(){ cfg.layout={ mobileSize:parseInt(document.getElementById('mobileSizeRange').value), mobileCols:parseInt(document.getElementById('mobileColsRange').value), desktopSize:parseInt(document.getElementById('desktopSizeRange').value), desktopCols:parseInt(document.getElementById('desktopColsRange').value), radius:parseInt(document.getElementById('radiusRange').value) }; applyLayout(); alert('生态布局已保存'); };
    window.applyBgSettings=function(){ cfg.mobileBackgrounds=[document.getElementById('mbg1').value,document.getElementById('mbg2').value]; cfg.desktopBackgrounds=[document.getElementById('dbg1').value,document.getElementById('dbg2').value]; cfg.bgInterval=parseInt(document.getElementById('bgIntervalSec').value); refreshBgImages(); startBgTimer(); alert('背景光晕已应用'); };
    window.copyConfigToClipboard=function(){ 
        let exportCfg={ bgInterval:cfg.bgInterval, mobileBackgrounds:cfg.mobileBackgrounds, desktopBackgrounds:cfg.desktopBackgrounds, layout:cfg.layout, 
            appButtons:cfg.appButtons.map((_,i)=>({ label:document.getElementById(`an_${i}`)?.value, url:document.getElementById(`au_${i}`)?.value, color:document.getElementById(`act_${i}`)?.value, buttonImage:document.getElementById(`aimg_${i}`)?.value, openType:document.getElementById(`aopen_${i}`)?.value, password:document.getElementById(`apwd_${i}`)?.value, autoRefresh:document.getElementById(`aref_${i}`)?.value==='true', passwordHint:document.getElementById(`ahint_${i}`)?.value, order:cfg.appButtons[i]?.order })),
            videoButtons:cfg.videoButtons.map((_,i)=>({ label:document.getElementById(`vn_${i}`)?.value, platform:document.getElementById(`vplat_${i}`)?.value, fileId:document.getElementById(`vplat_${i}`)?.value==='google-drive'? document.getElementById(`vin_${i}`)?.value:'', youtubeUrl:document.getElementById(`vplat_${i}`)?.value==='youtube'? document.getElementById(`vin_${i}`)?.value:'', color:document.getElementById(`vcolt_${i}`)?.value, buttonImage:document.getElementById(`vimg_${i}`)?.value, password:document.getElementById(`vpwd_${i}`)?.value, passwordHint:document.getElementById(`vhint_${i}`)?.value, order:cfg.videoButtons[i]?.order }))
        };
        navigator.clipboard.writeText(JSON.stringify(exportCfg,null,2)); alert('配置已复制 ✨ (包含排序顺序)');
    };
    window.onload=async()=>{ await loadConfig(); detectDevice(); if(isAdmin){ document.getElementById('frontendContainer').classList.add('hidden'); document.getElementById('adminContainer').classList.remove('hidden'); renderAdmin(); }else{ document.getElementById('frontendContainer').classList.remove('hidden'); document.getElementById('adminContainer').classList.add('hidden'); renderFrontend(); } document.getElementById('loadingMsg').style.display='none'; document.getElementById('mainContent').style.display='block'; };
    window.closeFullscreen=closeFullscreen;
</script>
</body>
</html>
